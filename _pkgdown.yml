url: https://taakefyrsten.github.io/tidysoilwater

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "tidysoilwater — Soil water retention and hydraulic conductivity"
  description: >
    Tidy tools for soil water retention curve modelling and unsaturated
    hydraulic conductivity. Implements the Van Genuchten (1980) and
    Mualem-Van Genuchten models with parameter fitting, confidence intervals,
    and derived soil hydraulic properties.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [ecosystem, github]
  components:
    intro:
      text: "Get started"
      href: articles/soil-water-retention.html
    ecosystem:
      text: "TidySoils"
      menu:
        - text: "TidySoils ecosystem"
          href: https://taakefyrsten.github.io/TidySoils
        - text: "---"
        - text: "tidysoiltexture"
          href: https://taakefyrsten.github.io/tidysoiltexture
        - text: "tidysoilwater"
          href: https://taakefyrsten.github.io/tidysoilwater
        - text: "tidysoilinfiltration"
          href: https://taakefyrsten.github.io/tidysoilinfiltration
    github:
      icon: fab fa-github
      href: https://github.com/Taakefyrsten/tidysoilwater
      aria-label: GitHub

reference:
  - title: "Soil water retention"
    desc: "Van Genuchten soil water retention curve and derived quantities"
    contents:
      - swrc_van_genuchten
      - soil_water_capacity
      - saturation_index
      - soil_water_diffusivity
  - title: "Hydraulic conductivity"
    desc: "Mualem-Van Genuchten unsaturated K(h)"
    contents:
      - hydraulic_conductivity
  - title: "Parameter fitting"
    desc: "Fit Van Genuchten parameters to observed retention and conductivity data"
    contents:
      - fit_swrc
      - fit_swrc_hcc
      - confint.fit_swrc

articles:
  - title: "Model functions"
    navbar: "Model functions"
    contents:
      - soil-water-retention
      - hydraulic-conductivity
  - title: "Fitting and diagnostics"
    navbar: "Fitting"
    contents:
      - fitting-diagnostics
      - pedotransfer
  - title: "Workflows"
    navbar: "Workflows"
    contents:
      - multi-pedon-workflow
      - raster-workflow

repo:
  url:
    home: https://github.com/Taakefyrsten/tidysoilwater
    source: https://github.com/Taakefyrsten/tidysoilwater/blob/main/
    issue: https://github.com/Taakefyrsten/tidysoilwater/issues
    user: https://github.com/

news:
  releases:
    - text: "tidysoilwater 1.2.0"
      href: news/index.html
